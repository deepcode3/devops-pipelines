name: CI pipeline

on:
  push:
    branches: [main]

jobs: 
  build: 
    runs-on: ubuntu-latest

steps:
  - name: Checkout code
    uses: actions/checkout@v5

  - name: Set u Node.jobs
    uses: actions/setup-node@v3
    with: 
      node-version: 16

  - name: Install dependices
    run: npm Install

  - name: Run tests
    run : npm test 